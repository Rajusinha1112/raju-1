<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Learnify</title>
  <link rel="stylesheet" href="../style.css"/>
  <style>
    .admin-auth-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
      background:
        radial-gradient(ellipse 70% 60% at 50% 30%, rgba(248,113,113,0.06) 0%, transparent 60%),
        var(--bg-primary);
    }
    .admin-auth-box {
      width: 100%; max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      box-shadow: var(--shadow-card);
      animation: fadeUp 0.5s ease;
    }
    .admin-flag {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
      border-radius: var(--radius-sm); padding: 0.5rem 1rem;
      color: var(--error); font-size: 0.8rem; font-weight: 600;
      margin-bottom: 1.75rem;
    }
    .back-link {
      display: block; text-align: center; margin-top: 1.25rem;
      font-size: 0.875rem; color: var(--text-muted);
    }
    .back-link a { color: var(--gold); }
  </style>
</head>
<body>
<div class="admin-auth-page">
  <div class="admin-auth-box">
    <div style="text-align:center;margin-bottom:1.5rem">
      <a href="../index.html" class="nav-logo" style="font-size:1.75rem">Learn<span>ify</span></a>
    </div>

    <div class="admin-flag">🔒 Restricted — Admin Access Only</div>

    <h2 style="text-align:center;margin-bottom:0.3rem">Admin Login</h2>
    <p style="text-align:center;color:var(--text-muted);font-size:0.875rem;margin-bottom:2rem">Sign in to manage your platform</p>

    <div id="admin-alert" class="alert"></div>

    <form id="admin-login-form">
      <div class="form-group">
        <label class="form-label">Admin Email</label>
        <input type="email" id="admin-email" class="form-control" placeholder="admin@learnify.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <input type="password" id="admin-pass" class="form-control" placeholder="Enter admin password" required/>
          <button type="button" id="toggle-pass" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem">👁</button>
        </div>
      </div>

      <button type="submit" id="btn-admin-login" class="btn btn-primary btn-block btn-lg" style="background:var(--error);margin-top:0.5rem">
        Sign In as Admin
      </button>
    </form>

    <div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.875rem;margin-top:1.5rem;font-size:0.82rem;color:var(--text-muted)">
      <div style="font-weight:600;color:var(--text-secondary);margin-bottom:0.35rem">🧪 Demo Credentials</div>
      <div>Email: <code style="color:var(--gold)">admin@learnify.com</code></div>
      <div>Password: <code style="color:var(--gold)">admin123</code></div>
    </div>

    <div class="back-link">Not an admin? <a href="../login.html">Student login →</a></div>
  </div>
</div>

<script src="../auth.js"></script>
<script>
  if (Auth.getCurrentAdmin()) location.href = 'admin-dashboard.html';

  document.getElementById('toggle-pass').addEventListener('click', function() {
    const inp = document.getElementById('admin-pass');
    const isPass = inp.type === 'password';
    inp.type = isPass ? 'text' : 'password';
    this.textContent = isPass ? '🙈' : '👁';
  });

  document.getElementById('admin-login-form').addEventListener('submit', e => {
    e.preventDefault();
    const btn = document.getElementById('btn-admin-login');
    setLoading(btn, true);
    setTimeout(() => {
      const result = Auth.adminLogin(
        document.getElementById('admin-email').value,
        document.getElementById('admin-pass').value
      );
      if (result.success) {
        showAlert('admin-alert', '✓ Login successful! Redirecting…', 'success');
        setTimeout(() => location.href = 'admin-dashboard.html', 700);
      } else {
        showAlert('admin-alert', result.msg, 'error');
        setLoading(btn, false);
      }
    }, 600);
  });
</script>
</body>
</html>
