<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Course Details — Learnify</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-logo">Learn<span>ify</span></a>
  <ul class="nav-links">
    <li><a href="courses.html">Courses</a></li>
  </ul>
  <div class="nav-actions" id="nav-actions">
    <a href="login.html" class="btn btn-outline">Login</a>
    <a href="register.html" class="btn btn-primary">Sign Up</a>
  </div>
</nav>

<!-- Hero -->
<div style="background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:6.5rem clamp(1rem,4vw,3rem) 2.5rem">
  <div class="container" style="display:grid;grid-template-columns:2fr 1fr;gap:3rem;align-items:start">
    <div>
      <div id="course-cat" class="course-tag" style="margin-bottom:0.75rem;display:inline-block"></div>
      <h1 id="course-title" style="margin-bottom:0.75rem">Loading…</h1>
      <p id="course-desc" style="font-size:1rem;margin-bottom:1.25rem"></p>
      <div id="course-meta" style="display:flex;flex-wrap:wrap;gap:1.5rem;font-size:0.875rem;color:var(--text-muted)"></div>
    </div>
    <!-- Sticky Card (desktop) -->
    <div id="enroll-card" class="card" style="padding:1.75rem;position:sticky;top:90px">
      <div id="card-emoji" style="font-size:4rem;text-align:center;margin-bottom:1rem"></div>
      <div id="card-price" style="text-align:center;margin-bottom:1.25rem"></div>
      <div id="enroll-btn-wrap" style="margin-bottom:1.25rem"></div>
      <div style="font-size:0.8rem;color:var(--text-muted);text-align:center">✅ Lifetime access &nbsp;|&nbsp; 📱 Mobile friendly &nbsp;|&nbsp; 🏆 Certificate</div>
      <div id="card-includes" style="margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border)"></div>
    </div>
  </div>
</div>

<!-- Content -->
<section style="padding:3rem clamp(1rem,4vw,3rem)">
  <div class="container" style="display:grid;grid-template-columns:2fr 1fr;gap:3rem">
    <div>
      <!-- What you'll learn -->
      <div class="card" style="padding:1.75rem;margin-bottom:1.5rem">
        <h3 style="margin-bottom:1.25rem">What You'll Learn</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem" id="learn-list"></div>
      </div>

      <!-- Tabs: Curriculum / About / Reviews -->
      <div class="tabs" style="margin-bottom:0">
        <button class="tab-btn active" data-tab="tab-curriculum">📋 Curriculum</button>
        <button class="tab-btn" data-tab="tab-about">👨‍🏫 Instructor</button>
        <button class="tab-btn" data-tab="tab-reviews">⭐ Reviews</button>
      </div>
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:0 0 var(--radius-md) var(--radius-md);padding:1.5rem">
        <div id="tab-curriculum" class="tab-pane active" id="tab-curriculum">
          <div id="curriculum-list" class="accordion"></div>
        </div>
        <div id="tab-about" class="tab-pane">
          <div id="instructor-info"></div>
        </div>
        <div id="tab-reviews" class="tab-pane">
          <div id="reviews-list"></div>
        </div>
      </div>
    </div>

    <!-- Sidebar info (mobile hidden) -->
    <div id="course-info-side" style="display:flex;flex-direction:column;gap:1rem">
      <!-- filled by JS -->
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <p>© 2025 Learnify</p>
      <a href="courses.html" style="color:var(--gold)">← All Courses</a>
    </div>
  </div>
</footer>

<script src="auth.js"></script>
<script src="courses.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const courseId = params.get('id');
  const user = Auth.getCurrentUser();

  if (!courseId) location.href = 'courses.html';

  const course = Courses.getById(courseId);
  if (!course) location.href = 'courses.html';

  // Fill hero
  document.getElementById('course-cat').textContent = course.category;
  document.getElementById('course-title').textContent = course.title;
  document.getElementById('course-desc').textContent = course.description;
  document.getElementById('card-emoji').textContent = course.emoji;
  document.title = course.title + ' — Learnify';

  document.getElementById('course-meta').innerHTML = `
    <span>${Courses.renderStars(course.rating)}</span>
    <span>👨‍🎓 ${course.students.toLocaleString()} students</span>
    <span>🕐 ${course.duration}</span>
    <span>📖 ${course.lessons} lessons</span>
    <span>📊 ${course.level}</span>
    <span>👨‍💼 ${course.instructor}</span>`;

  // Price & enroll card
  const enrolled = user && Courses.isEnrolled(user.id, courseId);
  document.getElementById('card-price').innerHTML = course.price === 0
    ? `<div style="font-size:2rem;font-family:var(--font-head);color:var(--success);font-weight:800">FREE</div>`
    : `<div style="font-size:2.2rem;font-family:var(--font-head);color:var(--gold);font-weight:800">₹${course.price.toLocaleString('en-IN')}</div>
       <div style="text-decoration:line-through;color:var(--text-muted);font-size:0.875rem">₹${course.originalPrice.toLocaleString('en-IN')}</div>
       <div style="color:var(--success);font-size:0.82rem;margin-top:0.25rem">
         ${Math.round(((course.originalPrice - course.price)/course.originalPrice)*100)}% OFF
       </div>`;

  document.getElementById('enroll-btn-wrap').innerHTML = enrolled
    ? `<a href="video-player.html?id=${courseId}" class="btn btn-primary btn-block btn-lg">▶ Continue Learning</a>`
    : user
      ? `<button id="btn-enroll" class="btn btn-primary btn-block btn-lg" onclick="enrollNow()">Enroll Now</button>`
      : `<a href="login.html" class="btn btn-primary btn-block btn-lg">Login to Enroll</a>`;

  document.getElementById('card-includes').innerHTML = `
    <div style="font-size:0.82rem;font-weight:600;color:var(--text-secondary);margin-bottom:0.75rem">This course includes:</div>
    <div style="display:flex;flex-direction:column;gap:0.4rem;font-size:0.82rem;color:var(--text-muted)">
      <div>🎬 ${course.lessons} on-demand video lessons</div>
      <div>⏱️ ${course.duration} total content</div>
      <div>♾️ Full lifetime access</div>
      <div>📱 Access on mobile & desktop</div>
      <div>📜 Certificate of completion</div>
    </div>`;

  // Tags
  const tagHtml = (course.tags || []).map(t => `<span class="badge badge-muted">${t}</span>`).join(' ');

  // What you'll learn
  const learns = [
    'Build real-world projects', 'Industry best practices', 'Career-ready skills',
    'Latest tools & techniques', 'Problem-solving mindset', 'Portfolio projects',
    'Code review techniques', 'Deployment & production'
  ];
  document.getElementById('learn-list').innerHTML = learns.map(l =>
    `<div style="display:flex;gap:0.5rem;font-size:0.875rem;color:var(--text-secondary)">
      <span style="color:var(--success);flex-shrink:0">✓</span>${l}
    </div>`).join('');

  // Curriculum accordion
  const sections = [
    { title: 'Getting Started', lessons: ['Introduction & Overview', 'Setup & Installation', 'Your First Project'] },
    { title: 'Core Fundamentals', lessons: ['Core Concepts Part 1', 'Core Concepts Part 2', 'Practice Exercises'] },
    { title: 'Intermediate Topics', lessons: ['Advanced Patterns', 'Real-World Examples', 'Mini Project'] },
    { title: 'Advanced & Projects', lessons: ['Performance & Optimization', 'Debugging Techniques', 'Final Capstone Project'] },
  ];
  document.getElementById('curriculum-list').innerHTML = sections.map(s => `
    <div class="accordion-item">
      <div class="accordion-header" onclick="this.classList.toggle('open');const b=this.nextElementSibling;b.classList.toggle('open')">
        <span>${s.title}</span>
        <span class="icon">▼</span>
      </div>
      <div class="accordion-body">
        ${s.lessons.map(l => `<div style="padding:0.4rem 0;border-bottom:1px solid var(--border);display:flex;gap:0.75rem;align-items:center">
          <span style="color:var(--gold)">▶</span>
          <span>${l}</span>
          <span style="margin-left:auto;font-size:0.75rem">~15 min</span>
        </div>`).join('')}
      </div>
    </div>`).join('');

  // Instructor
  document.getElementById('instructor-info').innerHTML = `
    <div style="display:flex;gap:1.25rem;align-items:flex-start">
      <div class="avatar" style="width:60px;height:60px;font-size:1.4rem;flex-shrink:0">${course.instructor.split(' ').map(n=>n[0]).join('').slice(0,2)}</div>
      <div>
        <h4>${course.instructor}</h4>
        <div style="color:var(--gold);font-size:0.82rem;margin-bottom:0.5rem">Senior Instructor</div>
        <p style="font-size:0.875rem">A passionate educator and industry professional with 8+ years of experience in ${course.category}. Has taught over 10,000 students across multiple platforms and holds certifications from top tech companies.</p>
      </div>
    </div>`;

  // Reviews
  const reviews = [
    { name: 'Siddharth K', rating: 5, text: 'Absolutely brilliant course. Every concept is explained clearly with practical examples. Highly recommended!' },
    { name: 'Anjali M', rating: 5, text: 'Best course I have taken! The projects helped me build a solid portfolio. Got hired within 2 months.' },
    { name: 'Rohan D', rating: 4, text: 'Great content overall. Some sections could be more in-depth but the fundamentals are excellent.' },
  ];
  document.getElementById('reviews-list').innerHTML = `
    <div style="display:flex;align-items:center;gap:2rem;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)">
      <div style="text-align:center">
        <div style="font-size:3.5rem;font-family:var(--font-head);font-weight:800;color:var(--gold)">${course.rating}</div>
        <div class="stars">★★★★★</div>
        <div style="font-size:0.78rem;color:var(--text-muted)">${course.students} ratings</div>
      </div>
    </div>
    ${reviews.map(r => `
      <div style="padding:1rem 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;gap:0.75rem;align-items:center;margin-bottom:0.5rem">
          <div class="avatar" style="width:34px;height:34px;font-size:0.8rem">${r.name[0]}</div>
          <div>
            <div style="font-size:0.875rem;font-weight:600">${r.name}</div>
            <div class="stars" style="font-size:0.78rem">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
          </div>
        </div>
        <p style="font-size:0.875rem">${r.text}</p>
      </div>`).join('')}`;

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      const pane = document.getElementById(btn.dataset.tab);
      if (pane) pane.classList.add('active');
    });
  });

  // Nav
  if (user) {
    document.getElementById('nav-actions').innerHTML = `
      <a href="student-dashboard.html" class="btn btn-outline">Dashboard</a>
      <button class="btn btn-primary" onclick="Auth.logout()">Logout</button>`;
  }

  function enrollNow() {
    if (!user) { location.href = 'login.html'; return; }
    const ok = Courses.enroll(user.id, courseId);
    if (ok || Courses.isEnrolled(user.id, courseId)) {
      document.getElementById('enroll-btn-wrap').innerHTML =
        `<a href="video-player.html?id=${courseId}" class="btn btn-primary btn-block btn-lg">▶ Start Learning</a>`;
    }
  }
</script>
</body>
</html>
